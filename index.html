<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Finder - Jikan + Consumet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .card { transition: all 0.3s; }
        .card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-5xl font-bold text-red-500 mb-2">Anime Finder</h1>
        <p class="text-zinc-400 mb-8">Jikan API (estable) + intento de streaming</p>

        <div class="flex gap-3 mb-8">
            <input type="text" id="searchInput" 
                   class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 text-lg focus:border-red-500 outline-none"
                   placeholder="Busca anime (naruto, one piece...)">
            <button onclick="searchAnime()" 
                    class="bg-red-600 hover:bg-red-700 px-10 rounded-2xl font-bold">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </div>

    <!-- Modal Detalle -->
    <div id="modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4 overflow-auto">
        <div class="bg-zinc-900 rounded-3xl max-w-3xl w-full">
            <div class="p-6 border-b border-zinc-700 flex justify-between">
                <h2 id="modalTitle" class="text-3xl font-bold"></h2>
                <button onclick="closeModal()" class="text-4xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
            <div class="p-6">
                <div class="flex flex-col md:flex-row gap-6">
                    <img id="modalImage" class="w-full md:w-80 rounded-2xl" alt="">
                    <div>
                        <p id="modalSynopsis" class="text-zinc-300 leading-relaxed"></p>
                        <div id="modalInfo" class="mt-6 grid grid-cols-2 gap-4 text-sm"></div>
                    </div>
                </div>

                <div class="mt-10">
                    <h3 class="text-xl mb-4 font-semibold">Trailer / Streaming (si disponible)</h3>
                    <div id="videoContainer" class="aspect-video bg-black rounded-2xl overflow-hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const JIKAN_BASE = "https://api.jikan.moe/v4";

        async function searchAnime() {
            const query = document.getElementById("searchInput").value.trim();
            if (!query) return;

            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = `<p class="col-span-full text-center py-20 text-zinc-400">Buscando...</p>`;

            try {
                const res = await fetch(`${JIKAN_BASE}/anime?q=${encodeURIComponent(query)}&limit=12`);
                const json = await res.json();

                resultsDiv.innerHTML = "";
                json.data.forEach(anime => {
                    const card = document.createElement("div");
                    card.className = "card bg-zinc-900 rounded-2xl overflow-hidden cursor-pointer";
                    card.innerHTML = `
                        <img src="${anime.images.jpg.image_url}" class="w-full h-72 object-cover" alt="${anime.title}">
                        <div class="p-4">
                            <h3 class="font-semibold line-clamp-2">${anime.title}</h3>
                            <p class="text-xs text-zinc-500 mt-2">${anime.type} • ${anime.year || 'N/A'}</p>
                        </div>
                    `;
                    card.onclick = () => showAnimeDetail(anime.mal_id);
                    resultsDiv.appendChild(card);
                });
            } catch(e) {
                resultsDiv.innerHTML = `<p class="col-span-full text-red-400 text-center py-20">Error con Jikan API</p>`;
            }
        }

        async function showAnimeDetail(id) {
            try {
                const res = await fetch(`${JIKAN_BASE}/anime/${id}/full`);
                const json = await res.json();
                const anime = json.data;

                document.getElementById("modalTitle").textContent = anime.title;
                document.getElementById("modalImage").src = anime.images.jpg.large_image_url || anime.images.jpg.image_url;
                document.getElementById("modalSynopsis").textContent = anime.synopsis || "Sin sinopsis disponible.";

                // Info básica
                let infoHTML = `
                    <p><strong>Estado:</strong> ${anime.status}</p>
                    <p><strong>Episodios:</strong> ${anime.episodes || 'N/A'}</p>
                    <p><strong>Score:</strong> ${anime.score ? anime.score + "/10" : 'N/A'}</p>
                    <p><strong>Año:</strong> ${anime.year || anime.aired.from?.split('-')[0]}</p>
                `;
                document.getElementById("modalInfo").innerHTML = infoHTML;

                // Intentar trailer de YouTube
                const container = document.getElementById("videoContainer");
                container.innerHTML = anime.trailer?.embed_url 
                    ? `<iframe class="w-full h-full" src="${anime.trailer.embed_url}" allowfullscreen></iframe>`
                    : `<div class="h-full flex items-center justify-center text-zinc-500">No hay trailer disponible</div>`;

                document.getElementById("modal").classList.remove("hidden");
            } catch(e) {
                alert("Error cargando detalles");
            }
        }

        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
        }

        // Buscar con Enter
        document.getElementById("searchInput").addEventListener("keypress", e => {
            if (e.key === "Enter") searchAnime();
        });

        // Cargar algunos populares al inicio
        window.onload = () => {
            document.getElementById("searchInput").value = "naruto";
            searchAnime();
        };
    </script>
</body>
</html>
