<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Search V1</title>
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        /* Título arriba, libre del contenedor oscuro */
        .app-header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 35px;
        }
        .app-header h1 {
            color: #b026ff;
            text-shadow: 0 0 15px rgba(176, 38, 255, 0.5);
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
        }

        /* Contenedor principal de la app */
        .main-container {
            background-color: #121212;
            border-radius: 8px;
            padding: 25px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #2a2a2a;
        }

        /* Elementos minimalistas */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        input {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            outline: none;
        }
        input:focus {
            border-color: #b026ff;
        }
        button {
            background: transparent;
            border: 1px solid #b026ff;
            color: #b026ff;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        button:hover {
            background: #b026ff;
            color: #000;
            box-shadow: 0 0 10px #b026ff;
        }

        /* Grilla de resultados horizontal */
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }
        .anime-card {
            text-align: center;
        }
        .anime-card img {
            width: 100%;
            border-radius: 6px;
        }
        .anime-title {
            font-size: 0.85rem;
            margin-top: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>AnimeSearch V1</h1>
    </div>

    <div class="main-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar anime (ej. Jujutsu)...">
            <button onclick="searchAnime()">Buscar</button>
        </div>
        <div id="resultsContainer" class="results"></div>
    </div>

    <script>
        // Usamos la API pública de Consumet apuntando al proveedor AnimeFLV
        // Usamos un proxy de AllOrigins para saltarnos el bloqueo CORS
const BASE_API = encodeURIComponent('https://api.consumet.org/anime/animeflv/');
const API_URL = `https://api.allorigins.win/raw?url=${BASE_API}`;
        async function searchAnime() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const container = document.getElementById('resultsContainer');
            container.innerHTML = '<p style="color: #b026ff; text-align: center;">Buscando en la base de datos...</p>';

            try {
                const response = await fetch(API_URL + query);
                const data = await response.json();
                
                container.innerHTML = ''; 
                
                if(data.results.length === 0) {
                    container.innerHTML = '<p style="color: #aaa;">No se encontraron resultados.</p>';
                    return;
                }

                data.results.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.innerHTML = `
                        <img src="${anime.image}" alt="${anime.title}">
                        <div class="anime-title">${anime.title}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = '<p style="color: #ff3366; text-align: center;">Error: La8 API pública está saturada o bloqueando la conexión. Necesitarás tu propio proxy.</p>';
            }
        }
    </script>
</body>
</html>
